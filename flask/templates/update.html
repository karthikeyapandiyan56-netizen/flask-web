{% extends 'base.html' %}

{% block head %}
Update Task
{% endblock %}

{% block body %}
<section class="glass-panel update-card">
    <h2>Update Task</h2>
    <form action="/update/{{ task.id }}" method="POST">
        <div class="input-group">
            <input 
                type="text" 
                name="content" 
                id="update-content-input" 
                class="todo-input" 
                value="{{ task.content }}" 
                placeholder="Update your task content..." 
                required 
                autocomplete="off"
                autofocus
            >
        </div>
        <div class="update-actions">
            <button type="submit" class="btn btn-primary" id="save-update-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Save Changes
            </button>
            <a href="/" class="btn btn-secondary" id="cancel-update-btn">
                Cancel
            </a>
        </div>
    </form>
</section>
{% endblock %}
