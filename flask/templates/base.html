<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, glassmorphic CRUD To-Do List web application built with Flask and Python.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>{% block head %}{% endblock %} | TaskFlow</title>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>TaskFlow</h1>
            <p class="subtitle">Organize your thoughts, plan your day</p>
        </header>

        <main>
            {% block body %}{% endblock %}
        </main>
    </div>
</body>
</html>
